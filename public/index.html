<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>WAYouT - Clean Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f0f0f] text-white p-6">
    <nav class="flex justify-between items-center mb-10 border-b border-zinc-800 pb-4">
        <h1 class="text-red-600 text-3xl font-bold">WAYouT</h1>
        <button onclick="document.getElementById('modal').classList.toggle('hidden')" class="bg-white text-black px-6 py-2 rounded-full font-bold">
            + SUBIR
        </button>
    </nav>

    <div id="modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center p-4">
        <form action="/upload" method="POST" enctype="multipart/form-data" class="bg-zinc-900 p-8 rounded-xl border border-zinc-700 w-full max-w-md flex flex-col gap-4">
            <input type="text" name="videoTitle" placeholder="Título" class="bg-zinc-800 p-3 rounded" required>
            <input type="file" name="videoFile" accept="video/*" required>
            <button type="submit" class="bg-red-600 py-3 rounded font-bold">PUBLICAR</button>
            <button type="button" onclick="document.getElementById('modal').classList.add('hidden')" class="text-zinc-400">Cancelar</button>
        </form>
    </div>

    <div id="grid" class="grid grid-cols-1 md:grid-cols-4 gap-6"></div>

    <script>
        async function load() {
            const r = await fetch('/api/videos');
            const videos = await r.json();
            document.getElementById('grid').innerHTML = videos.map(v => `
                <div class="cursor-pointer">
                    <video src="/videos/${v.file}" class="rounded-xl w-full" controls></video>
                    <h3 class="font-bold mt-2">${v.title}</h3>
                </div>`).join('');
        }
        load();
    </script>
</body>
</html>
