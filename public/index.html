<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>WAYouT - Privado</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f0f0f] text-white">
    <nav class="p-4 border-b border-zinc-800 flex justify-between">
        <h1 class="text-2xl font-bold text-red-500">WAYouT <span class="text-xs text-white">DATABASE MODE</span></h1>
    </nav>

    <main class="p-6">
        <div id="playerContainer" class="hidden mb-8 max-w-4xl mx-auto">
            <video id="mainVideo" controls class="w-full rounded-lg border border-zinc-700 shadow-xl">
                Tu navegador no soporta video.
            </video>
            <h2 id="currentTitle" class="text-2xl font-bold mt-4"></h2>
        </div>

        <div id="videoGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            </div>
    </main>

    <script>
        async function loadVideos() {
            const response = await fetch('/api/videos');
            const videos = await response.json();
            const grid = document.getElementById('videoGrid');

            grid.innerHTML = videos.map(v => `
                <div onclick="playLocal('${v.file}', '${v.title}')" class="cursor-pointer group">
                    <div class="bg-zinc-800 aspect-video rounded-xl mb-2 flex items-center justify-center border border-zinc-700 group-hover:border-red-500">
                         <span class="text-zinc-500">Video Local</span>
                    </div>
                    <h3 class="font-bold">${v.title}</h3>
                    <p class="text-sm text-zinc-400">Servido desde Render</p>
                </div>
            `).join('');
        }

        function playLocal(file, title) {
            const container = document.getElementById('playerContainer');
            const video = document.getElementById('mainVideo');
            document.getElementById('currentTitle').innerText = title;
            
            video.src = `/videos/${file}`;
            container.classList.remove('hidden');
            video.play();
            window.scrollTo(0, 0);
        }

        loadVideos();
    </script>
</body>
</html>
